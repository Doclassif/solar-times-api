<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar Times UI</title>
    <style id="appStyles">
      :root {
        --bg: #f7f8fa;
        --fg: #121316;
        --muted: #4f5660;
        --line: #d9dee5;
        --card: #ffffff;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      .wrap {
        max-width: 980px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 14px;
      }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 0; color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
      input, select, button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font-size: 14px;
      }
      button { cursor: pointer; background: #1f6feb; color: #fff; border-color: #1f6feb; }
      pre {
        margin: 0;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0e1116;
        color: #d8dee9;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid var(--line);
        padding: 8px;
        text-align: left;
      }
      th { background: #f3f5f8; }
      @media (max-width: 768px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Solar Times UI</h1>
        <p>Preview page. Use local NOAA calculation or an external API via API Base URL.</p>
        <div class="grid">
          <div><label>From</label><input id="from" type="date" /></div>
          <div><label>To</label><input id="to" type="date" /></div>
          <div><label>Latitude</label><input id="lat" type="number" step="any" /></div>
          <div><label>Longitude</label><input id="lon" type="number" step="any" /></div>
          <div><label>UTC Offset (Z, 3, -3, 03:00, -05:30)</label><input id="utcOffset" type="text" value="Z" /></div>
          <div><label>Format</label><select id="format"><option>json</option><option>xml</option><option>csv</option><option>html</option></select></div>
        </div>
        <div class="grid">
          <div style="grid-column: 1 / -1;"><label>API Base URL (optional, e.g. https://your-api.example.com)</label><input id="apiBase" type="text" /></div>
        </div>
        <div class="grid" style="grid-template-columns: 1fr; margin-top: 10px;"><button id="run">Calculate</button></div>
      </div>
      <div class="card" id="result"></div>
    </div>
    <pre id="rawOutput" style="display:none; margin:0;"></pre>
    <div id="rawHtml" style="display:none;"></div>

    <script>
      const OFFICIAL_ZENITH = 90.833;

      function toRad(deg) { return (deg * Math.PI) / 180; }
      function toDeg(rad) { return (rad * 180) / Math.PI; }
      function normalizeDegrees(degrees) { let v = degrees % 360; if (v < 0) v += 360; return v; }
      function normalizeHours(hours) { let v = hours % 24; if (v < 0) v += 24; return v; }

      function parseDate(value) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return null;
        const d = new Date(value + 'T00:00:00.000Z');
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function dayOfYear(date) {
        const start = Date.UTC(date.getUTCFullYear(), 0, 0);
        const cur = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
        return Math.floor((cur - start) / 86400000);
      }

      function buildUTCDate(date, hoursFloat) {
        const h = Math.floor(hoursFloat);
        const mFloat = (hoursFloat - h) * 60;
        const m = Math.floor(mFloat);
        const s = Math.round((mFloat - m) * 60);
        return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), h, m, s)).toISOString();
      }

      function calculateSolarEvent(date, latitude, longitude, isSunrise, zenith = OFFICIAL_ZENITH) {
        const n = dayOfYear(date);
        const lngHour = longitude / 15;
        const t = isSunrise ? n + (6 - lngHour) / 24 : n + (18 - lngHour) / 24;
        const M = 0.9856 * t - 3.289;

        let L = M + 1.916 * Math.sin(toRad(M)) + 0.02 * Math.sin(toRad(2 * M)) + 282.634;
        L = normalizeDegrees(L);

        let RA = toDeg(Math.atan(0.91764 * Math.tan(toRad(L))));
        RA = normalizeDegrees(RA);
        const lq = Math.floor(L / 90) * 90;
        const raq = Math.floor(RA / 90) * 90;
        RA = (RA + (lq - raq)) / 15;

        const sinDec = 0.39782 * Math.sin(toRad(L));
        const cosDec = Math.cos(Math.asin(sinDec));

        const cosH = (Math.cos(toRad(zenith)) - sinDec * Math.sin(toRad(latitude))) /
          (cosDec * Math.cos(toRad(latitude)));
        if (cosH > 1 || cosH < -1) return null;

        let H = isSunrise ? 360 - toDeg(Math.acos(cosH)) : toDeg(Math.acos(cosH));
        H /= 15;

        const localMeanTime = H + RA - 0.06571 * t - 6.622;
        const utcTime = normalizeHours(localMeanTime - lngHour);
        return buildUTCDate(date, utcTime);
      }

      function parseUtcOffset(value) {
        const raw = (value || 'Z').trim().toUpperCase();
        if (raw === 'Z' || raw === 'UTC' || raw === '+00:00' || raw === '-00:00') return { minutes: 0, label: 'Z' };
        const m = raw.match(/^([+-]?)(\d{1,2})(?::?(\d{2}))?$/);
        if (!m) return null;
        const sign = m[1] === '-' ? -1 : 1;
        const h = Number(m[2]);
        const min = m[3] ? Number(m[3]) : 0;
        if (h > 14 || min > 59) return null;
        if (h === 14 && min !== 0) return null;
        return { minutes: sign * (h * 60 + min), label: `${sign === 1 ? '+' : '-'}${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}` };
      }

      function toOffsetIso(utcIso, offset) {
        if (!utcIso) return null;
        const d = new Date(utcIso);
        const shifted = new Date(d.getTime() + offset.minutes * 60000);
        const base = shifted.toISOString().slice(0, 19);
        return offset.label === 'Z' ? `${base}Z` : `${base}${offset.label}`;
      }

      function calculateRange(fromDate, toDate, latitude, longitude, offset) {
        const out = [];
        const cur = new Date(Date.UTC(fromDate.getUTCFullYear(), fromDate.getUTCMonth(), fromDate.getUTCDate()));
        const end = new Date(Date.UTC(toDate.getUTCFullYear(), toDate.getUTCMonth(), toDate.getUTCDate()));

        while (cur <= end) {
          const sunriseUtc = calculateSolarEvent(cur, latitude, longitude, true);
          const sunsetUtc = calculateSolarEvent(cur, latitude, longitude, false);
          out.push({
            date: cur.toISOString().slice(0, 10),
            sunrise: toOffsetIso(sunriseUtc, offset),
            sunset: toOffsetIso(sunsetUtc, offset)
          });
          cur.setUTCDate(cur.getUTCDate() + 1);
        }
        return out;
      }

      function escXml(v) {
        return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
      }

      function toXml(payload) {
        const lines = ['<?xml version="1.0" encoding="UTF-8"?>', '<solarTimesResponse>', '  <meta>'];
        lines.push(`    <from>${escXml(payload.meta.from)}</from>`);
        lines.push(`    <to>${escXml(payload.meta.to)}</to>`);
        lines.push(`    <latitude>${escXml(payload.meta.latitude)}</latitude>`);
        lines.push(`    <longitude>${escXml(payload.meta.longitude)}</longitude>`);
        lines.push(`    <utcOffset>${escXml(payload.meta.utcOffset)}</utcOffset>`);
        lines.push('  </meta>');
        lines.push('  <results>');
        for (const item of payload.results) {
          lines.push('    <day>');
          lines.push(`      <date>${escXml(item.date)}</date>`);
          lines.push(`      <sunrise>${escXml(item.sunrise)}</sunrise>`);
          lines.push(`      <sunset>${escXml(item.sunset)}</sunset>`);
          lines.push('    </day>');
        }
        lines.push('  </results>');
        lines.push('</solarTimesResponse>');
        return lines.join('\n');
      }

      function toCsv(payload) {
        const rows = ['date,sunrise,sunset'];
        for (const r of payload.results) rows.push(`${r.date},${r.sunrise || ''},${r.sunset || ''}`);
        return rows.join('\n');
      }

      function render(payload, format) {
        const resultEl = document.getElementById('result');
        if (format === 'html') {
          const rows = payload.results.map((r) => `<tr><td>${escXml(r.date)}</td><td>${escXml(r.sunrise || '')}</td><td>${escXml(r.sunset || '')}</td></tr>`).join('');
          resultEl.innerHTML = `<table><thead><tr><th>Date</th><th>Sunrise</th><th>Sunset</th></tr></thead><tbody>${rows}</tbody></table>`;
          return;
        }
        if (format === 'xml') {
          resultEl.innerHTML = `<pre>${escXml(toXml(payload))}</pre>`;
          return;
        }
        if (format === 'csv') {
          resultEl.innerHTML = `<pre>${escXml(toCsv(payload))}</pre>`;
          return;
        }
        resultEl.innerHTML = `<pre>${escXml(JSON.stringify(payload, null, 2))}</pre>`;
      }

      function renderPseudoApi(payload, format) {
        const rawOutput = document.getElementById('rawOutput');
        const rawHtml = document.getElementById('rawHtml');
        rawOutput.style.display = 'none';
        rawHtml.style.display = 'none';

        if (format === 'html') {
          const rows = payload.results.map((r) => `<tr><td>${escXml(r.date)}</td><td>${escXml(r.sunrise || '')}</td><td>${escXml(r.sunset || '')}</td></tr>`).join('');
          rawHtml.innerHTML = `<table><thead><tr><th>Date</th><th>Sunrise</th><th>Sunset</th></tr></thead><tbody>${rows}</tbody></table>`;
          rawHtml.style.display = 'block';
          return;
        }

        if (format === 'xml') {
          rawOutput.textContent = toXml(payload);
        } else if (format === 'csv') {
          rawOutput.textContent = toCsv(payload);
        } else {
          rawOutput.textContent = JSON.stringify(payload, null, 2);
        }
        rawOutput.style.display = 'block';
      }

      function renderPseudoApiText(text) {
        const rawOutput = document.getElementById('rawOutput');
        const rawHtml = document.getElementById('rawHtml');
        rawHtml.style.display = 'none';
        rawOutput.textContent = text;
        rawOutput.style.display = 'block';
      }

      function getParams() {
        const q = new URLSearchParams(window.location.search);
        return {
          from: q.get('from') || q.get('c') || '',
          to: q.get('to') || q.get('po') || '',
          lat: q.get('lat') || q.get('latitude') || '',
          lon: q.get('lon') || q.get('longitude') || '',
          utcOffset: q.get('utcOffset') || q.get('utc') || 'Z',
          apiBase: q.get('apiBase') || '',
          pseudoApi: q.get('api') === '1' || (q.get('mode') || '').toLowerCase() === 'api',
          format: (q.get('format') || 'json').toLowerCase()
        };
      }

      function applyParamsToForm(p) {
        document.getElementById('from').value = p.from;
        document.getElementById('to').value = p.to;
        document.getElementById('lat').value = p.lat;
        document.getElementById('lon').value = p.lon;
        document.getElementById('utcOffset').value = p.utcOffset;
        document.getElementById('apiBase').value = p.apiBase;
        document.getElementById('format').value = ['json', 'xml', 'csv', 'html'].includes(p.format) ? p.format : 'json';
      }

      async function fetchFromApi(apiBase, params) {
        const base = apiBase.replace(/\/+$/, '');
        const query = new URLSearchParams({
          from: params.from,
          to: params.to,
          lat: String(params.lat),
          lon: String(params.lon),
          utcOffset: params.utcOffset,
          format: params.format
        });

        const response = await fetch(`${base}/solar-times?${query.toString()}`);
        const contentType = response.headers.get('content-type') || '';
        const text = await response.text();
        if (!response.ok) {
          throw new Error(`API error ${response.status}: ${text}`);
        }

        if (params.format === 'json' && contentType.includes('application/json')) {
          return JSON.parse(text);
        }
        return text;
      }

      async function calculateAndRender() {
        const fromRaw = document.getElementById('from').value;
        const toRaw = document.getElementById('to').value;
        const latRaw = document.getElementById('lat').value;
        const lonRaw = document.getElementById('lon').value;
        const utcOffsetRaw = document.getElementById('utcOffset').value;
        const apiBaseRaw = document.getElementById('apiBase').value.trim();
        const format = document.getElementById('format').value;
        const pseudoApiMode = params.pseudoApi;

        const from = parseDate(fromRaw);
        const to = parseDate(toRaw);
        const lat = Number(latRaw);
        const lon = Number(lonRaw);
        const offset = parseUtcOffset(utcOffsetRaw);

        if (!from || !to || !Number.isFinite(lat) || !Number.isFinite(lon) || !offset) {
          if (pseudoApiMode) {
            renderPseudoApiText('Invalid parameters.');
          } else {
            document.getElementById('result').innerHTML = '<pre>Invalid parameters.</pre>';
          }
          return;
        }
        if (from > to || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
          if (pseudoApiMode) {
            renderPseudoApiText('Validation failed.');
          } else {
            document.getElementById('result').innerHTML = '<pre>Validation failed.</pre>';
          }
          return;
        }

        const next = new URLSearchParams({
          from: fromRaw,
          to: toRaw,
          lat: String(lat),
          lon: String(lon),
          utcOffset: utcOffsetRaw,
          format,
          apiBase: apiBaseRaw,
          api: pseudoApiMode ? '1' : '0'
        });
        history.replaceState(null, '', `${location.pathname}?${next.toString()}`);

        if (apiBaseRaw) {
          try {
            const apiResult = await fetchFromApi(apiBaseRaw, {
              from: fromRaw,
              to: toRaw,
              lat,
              lon,
              utcOffset: utcOffsetRaw,
              format
            });

            if (format === 'json') {
              if (pseudoApiMode) {
                renderPseudoApi(apiResult, 'json');
              } else {
                render(apiResult, 'json');
              }
            } else if (format === 'html') {
              if (pseudoApiMode) {
                const rawOutput = document.getElementById('rawOutput');
                const rawHtml = document.getElementById('rawHtml');
                rawOutput.style.display = 'none';
                rawHtml.innerHTML = apiResult;
                rawHtml.style.display = 'block';
              } else {
                document.getElementById('result').innerHTML = apiResult;
              }
            } else {
              if (pseudoApiMode) {
                renderPseudoApiText(apiResult);
              } else {
                document.getElementById('result').innerHTML = `<pre>${escXml(apiResult)}</pre>`;
              }
            }
          } catch (error) {
            if (pseudoApiMode) {
              renderPseudoApiText(String(error.message || error));
            } else {
              document.getElementById('result').innerHTML = `<pre>${escXml(String(error.message || error))}</pre>`;
            }
          }
          return;
        }

        const results = calculateRange(from, to, lat, lon, offset);
        const payload = {
          meta: { from: fromRaw, to: toRaw, latitude: lat, longitude: lon, utcOffset: offset.label, zenith: OFFICIAL_ZENITH },
          results
        };
        if (pseudoApiMode) {
          renderPseudoApi(payload, format);
        } else {
          render(payload, format);
        }
      }

      const defaults = {
        from: new Date().toISOString().slice(0, 10),
        to: new Date().toISOString().slice(0, 10),
        lat: '53.9045',
        lon: '27.5615',
        utcOffset: '3',
        apiBase: '',
        format: 'json'
      };

      const params = { ...defaults, ...getParams() };
      if (params.pseudoApi) {
        const appStyles = document.getElementById('appStyles');
        if (appStyles) appStyles.remove();
        document.querySelector('.wrap').style.display = 'none';
      }
      applyParamsToForm(params);
      calculateAndRender();
      document.getElementById('run').addEventListener('click', calculateAndRender);
    </script>
  </body>
</html>
